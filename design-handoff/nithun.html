<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nithun — Oslo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
/* ── TOKENS ─────────────────────────────────────────────────── */
:root {
  --bg:        #1C1A17;
  --bg2:       #2A2620;
  --fg:        #E8DFC8;
  --fg2:       #B8B0A0;
  --fgm:       #9A8E7E;
  --olive:     #5C6B3A;
  --sage:      #8FAF6E;
  --navy:      #2C3E5C;
  --dusty:     #7090B0;
  --stone:     #C4A882;
  --honey:     #FAEDCB;
  --wheat:     #E8D49A;
  --writing-accent: #7090B0;
  --silence-accent: #8FAF6E;
  --books-accent:   #E8D49A;
  --radius: 3px;
  --max: 780px;
  --transition: 0.2s ease;
}
[data-theme="light"] {
  --bg:  #F5F0E8;
  --bg2: #EDE6D8;
  --fg:  #2A2218;
  --fg2: #5A5040;
  --fgm: #7A6E5E;
}

/* ── RESET ──────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  transition: background var(--transition), color var(--transition);
}

/* grain overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px;
  z-index: 9999;
}

/* ── PAGE FADE ──────────────────────────────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.page-enter { animation: fadeUp 0.4s ease forwards; }

/* ── NAV ────────────────────────────────────────────────────── */
nav.site-nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid color-mix(in oklch, var(--fg) 8%, transparent);
  padding: 0 clamp(24px, 5vw, 80px);
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  transition: background var(--transition);
}
.nav-wordmark {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 15px;
  font-weight: normal;
  color: var(--fg2);
  letter-spacing: 0.02em;
  cursor: pointer;
  text-decoration: none;
  background: none;
  border: none;
  padding: 0;
  transition: color var(--transition);
}
.nav-wordmark:hover { color: var(--fg); }
.nav-links {
  display: flex;
  align-items: center;
  gap: 32px;
  list-style: none;
}
.nav-links li button {
  background: none;
  border: none;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--fg2);
  padding: 4px 0;
  position: relative;
  transition: color var(--transition);
}
.nav-links li button::after {
  content: '';
  position: absolute;
  bottom: -2px; left: 0; right: 0;
  height: 1px;
  background: var(--fg);
  transform: scaleX(0);
  transition: transform 0.2s ease;
  transform-origin: left;
}
.nav-links li button:hover { color: var(--fg); }
.nav-links li button:hover::after,
.nav-links li button.active::after { transform: scaleX(1); }
.nav-links li button.active { color: var(--fg); }
.nav-links li button[data-section="writing"].active::after { background: var(--dusty); }
.nav-links li button[data-section="silence"].active::after { background: var(--sage); }
.nav-links li button[data-section="shelf"].active::after { background: var(--honey); }

.nav-controls {
  display: flex;
  align-items: center;
  gap: 16px;
}
.nav-toggle {
  background: none;
  border: 1px solid color-mix(in oklch, var(--fg) 18%, transparent);
  border-radius: 2px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.08em;
  color: var(--fgm);
  padding: 4px 8px;
  transition: color var(--transition), border-color var(--transition);
}
.nav-toggle:hover { color: var(--fg); border-color: color-mix(in oklch, var(--fg) 35%, transparent); }

/* ── LAYOUT SHELL ───────────────────────────────────────────── */
.page-shell {
  padding: 0 clamp(24px, 5vw, 80px);
  max-width: calc(var(--max) + 160px);
  margin: 0 auto;
}

/* ── HERO ───────────────────────────────────────────────────── */
.hero {
  padding: clamp(64px, 10vh, 120px) 0 clamp(48px, 8vh, 96px);
  display: grid;
  grid-template-columns: 1fr 220px;
  gap: 48px;
  align-items: start;
}
@media (max-width: 640px) {
  .hero { grid-template-columns: 1fr; }
  .hero-portrait { order: -1; }
}
.hero-name {
  font-family: Georgia, serif;
  font-size: clamp(32px, 5vw, 52px);
  font-weight: normal;
  color: var(--fg);
  line-height: 1.15;
  letter-spacing: -0.01em;
  margin-bottom: 10px;
}
.hero-location {
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--fgm);
  margin-bottom: 32px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.hero-location::before {
  content: '';
  display: inline-block;
  width: 16px;
  height: 1px;
  background: var(--fgm);
}
.hero-intro {
  font-size: 17px;
  line-height: 1.75;
  color: var(--fg2);
  max-width: 560px;
  margin-bottom: 24px;
  font-weight: 300;
}
.hero-teaser {
  font-family: Georgia, serif;
  font-size: 15px;
  font-style: italic;
  color: var(--fgm);
  border-left: 2px solid color-mix(in oklch, var(--stone) 50%, transparent);
  padding-left: 16px;
  line-height: 1.6;
  max-width: 480px;
}
.hero-portrait {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 0;
}
.portrait-frame {
  width: 200px;
  height: 240px;
  background: var(--bg2);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
}
.portrait-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 8px;
  background: linear-gradient(160deg, var(--bg2) 0%, color-mix(in oklch, var(--stone) 12%, var(--bg2)) 100%);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--fgm);
  font-family: monospace;
  text-align: center;
}
.portrait-placeholder svg { opacity: 0.3; }

/* section nav teasers */
.hero-sections {
  margin-top: clamp(40px, 6vh, 72px);
  padding-top: 40px;
  border-top: 1px solid color-mix(in oklch, var(--fg) 8%, transparent);
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
}
@media (max-width: 600px) { .hero-sections { grid-template-columns: 1fr; } }
.section-teaser {
  padding: 28px 24px 28px 0;
  border-right: 1px solid color-mix(in oklch, var(--fg) 8%, transparent);
  cursor: pointer;
  transition: background var(--transition);
}
.section-teaser:last-child { border-right: none; padding-right: 0; padding-left: 24px; }
.section-teaser:nth-child(2) { padding-left: 24px; }
.section-teaser:hover .teaser-title { color: var(--fg); }
.teaser-tag {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-weight: 500;
  margin-bottom: 10px;
  display: inline-block;
}
.teaser-tag.writing { color: var(--dusty); }
.teaser-tag.silence { color: var(--sage); }
.teaser-tag.shelf   { color: var(--honey); }
.teaser-title {
  font-family: Georgia, serif;
  font-size: 17px;
  color: var(--fg2);
  line-height: 1.4;
  margin-bottom: 8px;
  transition: color var(--transition);
}
.teaser-desc {
  font-size: 13px;
  color: var(--fgm);
  line-height: 1.55;
}

/* ── WRITING LIST ───────────────────────────────────────────── */
.writing-header {
  padding: 56px 0 48px;
  border-bottom: 1px solid color-mix(in oklch, var(--fg) 8%, transparent);
  margin-bottom: 0;
}
.page-title {
  font-family: Georgia, serif;
  font-size: clamp(26px, 4vw, 38px);
  font-weight: normal;
  color: var(--fg);
  margin-bottom: 10px;
}
.page-subtitle {
  font-size: 14px;
  color: var(--fgm);
  letter-spacing: 0.03em;
}
.writing-list { list-style: none; }
.writing-item {
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 24px;
  padding: 32px 0;
  border-bottom: 1px solid color-mix(in oklch, var(--fg) 7%, transparent);
  cursor: pointer;
  transition: background var(--transition);
}
.writing-item:hover .writing-item-title { color: var(--fg); }
@media (max-width: 560px) {
  .writing-item { grid-template-columns: 1fr; gap: 8px; }
}
.writing-date {
  font-size: 12px;
  color: var(--fgm);
  letter-spacing: 0.04em;
  padding-top: 4px;
  line-height: 1.4;
  font-variant-numeric: tabular-nums;
}
.writing-item-title {
  font-family: Georgia, serif;
  font-size: 20px;
  font-weight: normal;
  color: var(--fg2);
  line-height: 1.35;
  margin-bottom: 8px;
  transition: color var(--transition);
}
.writing-item-summary {
  font-size: 14px;
  color: var(--fgm);
  line-height: 1.6;
  max-width: 560px;
}
.writing-item-tags {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  flex-wrap: wrap;
}
.tag {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--fgm);
  border: 1px solid color-mix(in oklch, var(--fgm) 35%, transparent);
  padding: 2px 7px;
  border-radius: 2px;
}

/* ── WRITING POST ───────────────────────────────────────────── */
.post-header {
  padding: 64px 0 48px;
  max-width: var(--max);
  border-bottom: 1px solid color-mix(in oklch, var(--fg) 8%, transparent);
  margin-bottom: 48px;
}
.post-back {
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fgm);
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
  margin-bottom: 32px;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: color var(--transition);
}
.post-back:hover { color: var(--fg); }
.post-back::before {
  content: '←';
  font-size: 14px;
}
.post-title {
  font-family: Georgia, serif;
  font-size: clamp(26px, 4.5vw, 44px);
  font-weight: normal;
  color: var(--fg);
  line-height: 1.25;
  margin-bottom: 16px;
  text-wrap: pretty;
}
.post-meta {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 12px;
  color: var(--fgm);
  letter-spacing: 0.04em;
}
.post-meta-sep { color: color-mix(in oklch, var(--fgm) 40%, transparent); }
.post-body {
  max-width: var(--max);
  font-size: 17px;
  line-height: 1.82;
  color: var(--fg2);
}
.post-body p { margin-bottom: 1.5em; }
.post-body h2 {
  font-family: Georgia, serif;
  font-size: 22px;
  font-weight: normal;
  color: var(--fg);
  margin: 2.5em 0 0.8em;
  line-height: 1.3;
}
.post-body blockquote {
  border-left: 2px solid color-mix(in oklch, var(--stone) 50%, transparent);
  padding: 4px 0 4px 24px;
  margin: 2em 0;
  font-style: italic;
  color: var(--fgm);
  font-size: 16px;
}
.post-footer {
  max-width: var(--max);
  margin-top: 72px;
  padding-top: 32px;
  border-top: 1px solid color-mix(in oklch, var(--fg) 8%, transparent);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
}
.mastodon-link {
  font-size: 13px;
  color: var(--fgm);
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
  transition: color var(--transition);
}
.mastodon-link:hover { color: var(--fg2); }

/* ── SILENCE ────────────────────────────────────────────────── */
.silence-page {
  padding: 64px 0 80px;
}
.silence-header {
  margin-bottom: 56px;
}
.silence-header .page-title { margin-bottom: 6px; }
.silence-header .page-subtitle { max-width: 500px; }

.sound-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  max-width: 640px;
  margin-bottom: 48px;
}
@media (max-width: 480px) { .sound-grid { grid-template-columns: 1fr; } }

.sound-card {
  background: var(--bg2);
  border: 1px solid color-mix(in oklch, var(--fg) 7%, transparent);
  border-radius: 4px;
  padding: 32px 28px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: border-color 0.25s ease, transform 0.15s ease;
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 140px;
  justify-content: flex-end;
}
.sound-card::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.3s ease;
  border-radius: 4px;
}
.sound-card.brown::before  { background: radial-gradient(ellipse at 30% 30%, color-mix(in oklch, var(--stone) 15%, transparent), transparent 65%); }
.sound-card.pink::before   { background: radial-gradient(ellipse at 70% 30%, color-mix(in oklch, var(--wheat) 12%, transparent), transparent 65%); }
.sound-card.rain::before   { background: radial-gradient(ellipse at 30% 70%, color-mix(in oklch, var(--dusty) 12%, transparent), transparent 65%); }
.sound-card.ocean::before  { background: radial-gradient(ellipse at 70% 70%, color-mix(in oklch, var(--sage) 10%, transparent), transparent 65%); }

.sound-card:hover { border-color: color-mix(in oklch, var(--fg) 18%, transparent); transform: translateY(-1px); }
.sound-card:hover::before { opacity: 1; }
.sound-card.playing {
  border-color: color-mix(in oklch, var(--sage) 50%, transparent);
}
.sound-card.playing::before { opacity: 1; }

.sound-icon {
  position: absolute;
  top: 24px;
  right: 24px;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0.35;
}
.sound-name {
  font-family: Georgia, serif;
  font-size: 18px;
  color: var(--fg);
  font-weight: normal;
}
.sound-desc {
  font-size: 12px;
  color: var(--fgm);
  letter-spacing: 0.04em;
  line-height: 1.5;
}
.sound-playing-indicator {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 4px;
}
.sound-bar {
  width: 2px;
  border-radius: 2px;
  background: var(--sage);
  animation: soundBars 0.8s ease infinite;
}
.sound-bar:nth-child(1) { height: 8px; animation-delay: 0s; }
.sound-bar:nth-child(2) { height: 14px; animation-delay: 0.15s; }
.sound-bar:nth-child(3) { height: 10px; animation-delay: 0.3s; }
.sound-bar:nth-child(4) { height: 6px; animation-delay: 0.45s; }
@keyframes soundBars {
  0%, 100% { opacity: 0.4; transform: scaleY(0.6); }
  50%       { opacity: 1;   transform: scaleY(1); }
}

.silence-controls {
  max-width: 400px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  padding: 32px;
  background: var(--bg2);
  border-radius: 4px;
  border: 1px solid color-mix(in oklch, var(--fg) 7%, transparent);
  margin-bottom: 48px;
}
.control-label {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--fgm);
  margin-bottom: 12px;
}
.volume-slider {
  -webkit-appearance: none;
  width: 100%;
  height: 2px;
  background: color-mix(in oklch, var(--fg) 15%, transparent);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}
.volume-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--fg);
  cursor: pointer;
  box-shadow: 0 0 0 3px var(--bg2);
}
.timer-options {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.timer-btn {
  font-size: 12px;
  color: var(--fgm);
  background: none;
  border: 1px solid color-mix(in oklch, var(--fgm) 30%, transparent);
  border-radius: 2px;
  padding: 5px 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.timer-btn:hover, .timer-btn.active {
  color: var(--fg);
  border-color: color-mix(in oklch, var(--fg) 35%, transparent);
}
.silence-charity {
  max-width: 500px;
  padding: 28px 32px;
  background: color-mix(in oklch, var(--olive) 8%, var(--bg2));
  border: 1px solid color-mix(in oklch, var(--olive) 25%, transparent);
  border-radius: 4px;
}
.charity-title {
  font-family: Georgia, serif;
  font-size: 16px;
  color: var(--fg2);
  margin-bottom: 8px;
}
.charity-body {
  font-size: 13px;
  color: var(--fgm);
  line-height: 1.65;
  margin-bottom: 16px;
}
.charity-link {
  font-size: 12px;
  letter-spacing: 0.07em;
  color: var(--sage);
  text-decoration: none;
  border-bottom: 1px solid color-mix(in oklch, var(--sage) 40%, transparent);
  padding-bottom: 1px;
  cursor: pointer;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
  transition: color var(--transition), border-color var(--transition);
}
.charity-link:hover { color: color-mix(in oklch, var(--sage) 150%, white 20%); }

/* ── SHELF ──────────────────────────────────────────────────── */
.shelf-tabs {
  display: flex;
  gap: 0;
  padding: 32px 0 0;
  border-top: 1px solid color-mix(in oklch, var(--fg) 8%, transparent);
}
.shelf-tab {
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 0.04em;
  color: var(--fgm);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  padding: 8px 20px 8px 0;
  margin-right: 24px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
  font-family: 'DM Sans', sans-serif;
}
.shelf-tab:hover { color: var(--fg2); }
.shelf-tab.active { color: var(--fg); border-bottom-color: var(--honey); }
.shelf-tab.active[data-cat="books"]  { border-bottom-color: var(--wheat); }
.shelf-tab.active[data-cat="series"] { border-bottom-color: var(--dusty); }
.shelf-tab.active[data-cat="games"]  { border-bottom-color: var(--sage);  }

.shelf-filters {
  display: flex;
  gap: 8px;
  padding: 20px 0 0;
  flex-wrap: wrap;
}
.filter-btn {
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fgm);
  background: none;
  border: 1px solid color-mix(in oklch, var(--fgm) 28%, transparent);
  border-radius: 2px;
  padding: 4px 11px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
}
.filter-btn:hover { color: var(--fg2); border-color: color-mix(in oklch, var(--fg) 25%, transparent); }
.filter-btn.active { color: var(--fg2); border-color: color-mix(in oklch, var(--fg) 35%, transparent); background: color-mix(in oklch, var(--fg) 5%, transparent); }

.shelf-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 24px 20px;
  padding: 32px 0 80px;
}
.shelf-card {
  cursor: default;
  display: flex;
  flex-direction: column;

// ── WEB AUDIO ─────────────────────────────────────────────────
class NoiseEngine {
  constructor() {
    this.ctx = null;
    this.gainNode = null;
    this.source = null;
    this.active = false;
  }
  async init() {
    if (!this.ctx) {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.gainNode = this.ctx.createGain();
      this.gainNode.connect(this.ctx.destination);
    }
    if (this.ctx.state === 'suspended') await this.ctx.resume();
  }
  stop() {
    if (this.source) { try { this.source.stop(); } catch(e){} this.source = null; }
    this.active = false;
  }
  async play(type, vol = 0.7) {
    await this.init();
    this.stop();
    this.gainNode.gain.setValueAtTime(vol, this.ctx.currentTime);
    const bufferSize = this.ctx.sampleRate * 4;
    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    if (type === 'brown') {
      let last = 0;
      for (let i = 0; i < bufferSize; i++) {
        const w = (Math.random() * 2 - 1) * 0.15;
        data[i] = last = (last + 0.02 * w) / 1.02;
      }
    } else if (type === 'pink') {
      let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
      for (let i = 0; i < bufferSize; i++) {
        const w = Math.random() * 2 - 1;
        b0 = 0.99886*b0 + w*0.0555179; b1 = 0.99332*b1 + w*0.0750759;
        b2 = 0.96900*b2 + w*0.1538520; b3 = 0.86650*b3 + w*0.3104856;
        b4 = 0.55000*b4 + w*0.5329522; b5 = -0.7616*b5 - w*0.0168980;
        data[i] = (b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11; b6 = w*0.115926;
      }
    } else if (type === 'rain') {
      for (let i = 0; i < bufferSize; i++) {
        const w = Math.random() * 2 - 1;
        data[i] = w * (0.3 + 0.2 * Math.sin(i * 0.0003)) * 0.4;
      }
    } else { // ocean
      for (let i = 0; i < bufferSize; i++) {
        const wave = Math.sin(i * 0.0001) * 0.5 + 0.5;
        data[i] = (Math.random() * 2 - 1) * wave * 0.5;
      }
    }
    this.source = this.ctx.createBufferSource();
    this.source.buffer = buffer;
    this.source.loop = true;
    this.source.connect(this.gainNode);
    this.source.start();
    this.active = true;
  }
  setVolume(v) {
    if (this.gainNode) this.gainNode.gain.setValueAtTime(v, this.ctx.currentTime);
  }
}

              {[null, 15, 30, 45, 60].map(t => (
                <button
                  key={String(t)}
                  className={`timer-btn ${timer === t ? 'active' : ''}`}
                  onClick={() => setTimer(t)}
                >
                  {t ? `${t} min` : 'Off'}
                </button>
              ))}
            </div>
          </div>
        </div>

        <div className="silence-charity">
          <div className="charity-title">About this tool</div>
          <div className="charity-body">
            Built for those who live with tinnitus. If it helps, consider a small donation to 
            the Norwegian Tinnitus Association (Norges Tinnitusforening) — they fund research 
            and support for people affected.
          </div>
          <button className="charity-link">Donate to Norges Tinnitusforening →</button>
        </div>
      </div>
    </div>
  );
}

// ── SHELF ─────────────────────────────────────────────────────
const CAT_COVER = { books: 'book-cover', series: 'series-cover', games: 'game-cover' };
const CAT_SUBTITLES = { books: 'Author', series: 'Platform', games: 'Platform' };

function Shelf() {
  const [cat, setCat] = useState('books');
  const [status, setStatus] = useState('all');

  const items = SHELF[cat];
  const filtered = status === 'all' ? items : items.filter(i => i.status === status);

  return (
    <div className="page-shell page-enter">
      <div className="writing-header">
        <h1 className="page-title">Shelf</h1>
        <p className="page-subtitle">Books, series, and games — a personal log of what's been worth the time.</p>
      </div>

      <div className="shelf-tabs">
        {[['books','Books'],['series','Series'],['games','Games']].map(([v,l]) => (
          <button
            key={v}
            data-cat={v}
            className={`shelf-tab ${cat === v ? 'active' : ''}`}
            onClick={() => { setCat(v); setStatus('all'); }}
          >{l}</button>
        ))}
      </div>

      <div className="shelf-filters">
        {[['all','All'],['current','Currently'],['finished','Finished'],['want','Want to']].map(([v,l]) => (
          <button
            key={v}
            className={`filter-btn ${status === v ? 'active' : ''}`}
            onClick={() => setStatus(v)}
          >{l}</button>
        ))}
      </div>

      <div className="shelf-grid">
        {filtered.length === 0 ? (
          <div className="shelf-empty">Nothing here yet.</div>
        ) : filtered.map((item, i) => (
          <div className="shelf-card" key={i}>
            <div className={`shelf-cover ${CAT_COVER[cat]}`}>
              {item.title}
            </div>
            <div className="shelf-item-title">{item.title}</div>
            <div className="shelf-item-sub">{item.sub}</div>
            <div className="shelf-item-meta">
              <span className={`shelf-status-dot ${item.status}`}></span>
              {STATUS_LABELS[item.status]}
              {item.meta ? ` · ${item.meta}` : ''}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── FOOTER ────────────────────────────────────────────────────
function Footer() {
  return (
    <footer className="site-footer">
      <div className="footer-note">Last updated April 2025</div>
      <div className="footer-links">
        <button className="footer-link">GitHub</button>
        <button className="footer-link">CC BY-NC 4.0</button>
        <button className="footer-link">RSS</button>
      </div>
    </footer>
  );
}

// ── TWEAKS ────────────────────────────────────────────────────
function TweaksPanel({ theme, setTheme, onClose }) {
  const [serif, setSerif] = useState('Georgia');
  const [density, setDensity] = useState('comfortable');

  useEffect(() => {
    document.documentElement.style.setProperty('--heading-font', serif === 'Georgia' ? 'Georgia, serif' : '"Palatino Linotype", serif');
  }, [serif]);

  return (
    <div className="tweaks-overlay">
      <div className="tweaks-title">
        Tweaks
        <button className="tweaks-close" onClick={onClose}>✕</button>
      </div>
      <div className="tweak-row">
        <span className="tweak-label">Dark mode</span>
        <button
          className={`tweak-toggle-pill ${theme === 'dark' ? 'on' : 'off'}`}
          onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')}
        />
      </div>
      <div className="tweak-row">
        <span className="tweak-label">Serif font</span>
        <select className="tweak-select" value={serif} onChange={e => setSerif(e.target.value)}>
          <option>Georgia</option>
          <option>Palatino</option>
        </select>
      </div>
      <div className="tweak-row">
        <span className="tweak-label">Type density</span>
        <select className="tweak-select" value={density} onChange={e => {
          setDensity(e.target.value);
          document.documentElement.style.setProperty('--base-size', e.target.value === 'compact' ? '15px' : '16px');
        }}>
          <option value="comfortable">Comfortable</option>
          <option value="compact">Compact</option>
        </select>
      </div>
    </div>
  );
}

// ── APP ROOT ──────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('home');
  const [post, setPost] = useState(null);
  const [theme, setTheme] = useState('dark');
  const [tweaks, setTweaks] = useState(false);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
  }, [theme]);

  // tweaks host protocol
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode')   setTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const renderPage = () => {
    switch(page) {
      case 'home':    return <Hero setPage={setPage} setPost={setPost} />;
      case 'writing': return <WritingList setPage={setPage} setPost={setPost} />;
      case 'post':    return <WritingPost post={post} setPage={setPage} />;
      case 'silence': return <Silence />;
      case 'shelf':   return <Shelf />;
      default:        return <Hero setPage={setPage} setPost={setPost} />;
    }
  };

  return (
    <>
      <Nav page={page} setPage={setPage} theme={theme} setTheme={setTheme} />
      <main style={{minHeight: 'calc(100vh - 56px - 73px)'}}>
        {renderPage()}
      </main>
      <Footer />
      {tweaks && (
        <TweaksPanel
          theme={theme}
          setTheme={setTheme}
          onClose={() => {
            setTweaks(false);
            window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
          }}
        />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
